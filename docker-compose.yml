services:
  vibe-ssh-bot:
    build: .
    container_name: vibe-ssh-bot
    restart: unless-stopped
    env_file:
      - .env
    # Named volume (not a host bind mount): it inherits the image's app-owned
    # config dir, so the non-root container user can write servers.json.
    volumes:
      - vibessh-config:/usr/src/app/config

volumes:
  vibessh-config: